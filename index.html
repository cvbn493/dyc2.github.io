<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网易云音乐播放器</title>
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 播放器主容器 -->
    <div class="player-container">
        
        <!-- 左侧：唱片与封面 -->
        <div class="left-panel">
            <div class="disc-wrapper">
                <!-- 唱片外框 -->
                <img src="music/img/record0.jpg" alt="唱片" class="disc-bg">
                <!-- 中间旋转的封面 -->
                <div class="cover-wrapper" id="coverWrapper">
                    <img src="music/img/bg0.png" alt="封面" id="coverImg" class="cover-img">
                </div>
            </div>
        </div>

        <!-- 右侧：控制栏 -->
        <div class="right-panel">
            <!-- 顶部：歌名与歌手 -->
            <div class="song-info">
                <h2 id="songTitle">歌曲名称</h2>
                <p id="artistName">歌手名称</p>
            </div>

            <!-- 中部：进度条 -->
            <div class="progress-container">
                <span id="currentTime">00:00</span>
                <div class="progress-bar-bg" id="progressBarBg">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                    <div class="progress-btn" id="progressBtn"></div>
                </div>
                <span id="duration">00:00</span>
            </div>

            <!-- 底部：控制按钮 -->
            <div class="controls">
                <!-- 播放模式 -->
                <button id="modeBtn">
                    <img src="music/img/mode1.png" alt="模式">
                </button>

                <!-- 上一曲 -->
                <button id="prevBtn">
                    <img src="music/img/上一首.png" alt="上一首">
                </button>

                <!-- 播放/暂停 -->
                <button id="playBtn" class="play-pause-btn">
                    <img src="music/img/暂停.png" alt="暂停" id="playIcon">
                </button>

                <!-- 下一曲 -->
                <button id="nextBtn">
                    <img src="music/img/下一首.png" alt="下一首">
                </button>

                <!-- 播放列表 -->
                <button id="listBtn">
                    <img src="music/img/MV.png" alt="列表"> <!-- 暂时复用MV图标作为列表图标 -->
                </button>
            </div>
        </div>

        <!-- 播放列表弹窗 (默认隐藏) -->
        <div class="playlist-modal" id="playlistModal">
            <div class="modal-header">
                <h3>播放列表</h3>
                <span id="closeListBtn">X</span>
            </div>
            <ul id="songList" class="song-list">
                <!-- 列表项将由 JS 动态生成 -->
            </ul>
        </div>

    </div>

    <!-- 音频标签 (隐藏) -->
    <audio id="audio" src=""></audio>

    <!-- 引入脚本文件 -->
    <script src="script.js"></script>
</body>
</html>
